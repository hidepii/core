<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional PII Detector & Redactor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="step-flow-container">
            
            <!-- STEP 1: Input Source Text -->
            <div class="step-block">
                <div class="step-body">
                    <div class="step-title-row">
                        <h2><span class="step-num">1</span>Input Source Text</h2>
                        <button type="button" class="import-btn" id="upload-trigger">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                            Import File
                        </button>
                        <input type="file" id="hidden-file-input" accept=".txt" style="display: none;">
                    </div>
                    
                    <textarea id="text-input" placeholder="Enter or paste your text here..."></textarea>
                    <div class="textarea-counter"><span id="word-char-count">0 words | 0 chars</span></div>
                </div>
            </div>

            <!-- STEP 2: Custom Keyword Filter -->
            <div class="step-block">
                <div class="step-body">
                    <h2 class="standalone-title"><span class="step-num">2</span>Custom Keyword Filter</h2>
                    <div class="keyword-input-row">
                        <input type="text" id="custom-keyword-input" placeholder="e.g., SecretProject">
                        <button type="button" id="add-keyword-btn" class="btn-inline-add">Add</button>
                    </div>
                    <div class="tags-container" id="custom-tags-container"></div>
                </div>
            </div>

            <!-- STEP 3: Detected PII Items -->
            <div class="step-block">
                <div class="step-body">
                    <div class="report-header">
                        <h2><span class="step-num">3</span>Scan & Review Entities</h2>
                        <span class="badge" id="detected-count">0</span>
                    </div>
                    
                    <div class="detected-display-box" id="detected-items-container">
                        <div class="empty-placeholder" id="empty-state-msg">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                            <span>No items detected. Click "Scan & Filter Text" below.</span>
                        </div>
                    </div>

                    <button type="button" id="scan-btn" class="btn btn-primary btn-full">Scan & Filter Text</button>
                </div>
            </div>

            <!-- STEP 4: Actions -->
            <div class="step-block">
                <div class="step-body">
                    <h2 class="standalone-title"><span class="step-num">4</span>Export Secure Output</h2>
                    <div class="actions-row">
                        <button type="button" id="copy-btn" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            Copy Result
                        </button>
                        <button type="button" id="download-btn" class="btn btn-secondary">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            Download .txt
                        </button>
                        <button type="button" id="reset-btn" class="btn btn-danger">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-icon"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                            Reset All
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="custom_filter.js"></script>
    <script src="pii_detector.js"></script>
    <script src="action.js"></script>
    <script src="app.js"></script>
</body>
</html>
